<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Main speech bubble (large, primary) -->
  <rect x="160" y="40" width="200" height="130" rx="18" fill="#185FA5" stroke="#0C447C" stroke-width="1.5"/>
  <!-- Bubble tail -->
  <polygon points="200,168 185,200 230,168" fill="#185FA5"/>
  <!-- Lines inside bubble (blog post lines) -->
  <rect x="182" y="66" width="120" height="8" rx="4" fill="#B5D4F4" opacity="0.9"/>
  <rect x="182" y="84" width="90" height="7" rx="3.5" fill="#B5D4F4" opacity="0.6"/>
  <rect x="182" y="100" width="108" height="7" rx="3.5" fill="#B5D4F4" opacity="0.6"/>
  <rect x="182" y="116" width="75" height="7" rx="3.5" fill="#B5D4F4" opacity="0.5"/>
  <rect x="182" y="132" width="96" height="7" rx="3.5" fill="#B5D4F4" opacity="0.4"/>

  <!-- Second speech bubble (reply, smaller, offset) -->
  <rect x="300" y="90" width="150" height="96" rx="14" fill="#042C53" stroke="#185FA5" stroke-width="1.5"/>
  <!-- Bubble tail (left side) -->
  <polygon points="310,134 280,148 310,154" fill="#042C53"/>
  <!-- Lines inside reply bubble -->
  <rect x="318" y="112" width="80" height="7" rx="3.5" fill="#85B7EB" opacity="0.8"/>
  <rect x="318" y="128" width="60" height="7" rx="3.5" fill="#85B7EB" opacity="0.55"/>
  <rect x="318" y="144" width="72" height="7" rx="3.5" fill="#85B7EB" opacity="0.45"/>

  <!-- Small dot decoration (community feel) -->
  <circle cx="160" cy="205" r="5" fill="#378ADD" opacity="0.5"/>
  <circle cx="148" cy="220" r="3.5" fill="#378ADD" opacity="0.3"/>
  <circle cx="138" cy="232" r="2.5" fill="#378ADD" opacity="0.2"/>

  <!-- App name text -->
  <text x="340" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#185FA5" letter-spacing="-1">forum</text>
  <text x="340" y="245" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="400" fill="#378ADD" letter-spacing="4">SHARE · DISCUSS · CONNECT</text>
</svg>